<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #fffafb; color: #333; margin: 0; padding: 0; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        #details { opacity: 0; transition: opacity 0.5s; }
        .swiper { width: 100%; height: 350px; background: #f9f9f9; position: relative; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: contain; }
        
        /* تنسيق الأسهم */
        .swiper-button-next, .swiper-button-prev { color: #ff69b4 !important; }
        
        .content { padding: 20px; }
        h1 { color: #ff69b4; text-align: center; }
        .price { font-size: 1.5rem; font-weight: bold; text-align: center; margin-bottom: 15px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; text-align: right; font-family: 'Tajawal', sans-serif; }
        
        /* إزالة المربع الأزرق نهائياً */
        button:focus, input:focus, select:focus { outline: none !important; box-shadow: none !important; }
        
        .qty-container { display: flex; flex-direction: column; align-items: center; margin: 10px 0; }
        .qty-wrapper { display: flex; align-items: center; gap: 15px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: #ff69b4; color: white; cursor: pointer; }
        .qty-value { font-weight: bold; width: 25px; text-align: center; }
        
        .note-box { background: #ffeef5; padding: 10px; border-radius: 10px; border: 1px solid #ff69b4; font-size: 0.9rem; margin: 10px 0; }
        .main-btn { background: #ff69b4; color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #order-form { display: none; padding: 20px; }
    </style>
</head>
<body>

<div class="container" id="details"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const id = new URLSearchParams(window.location.search).get('id');
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSMKhHdK0M6unNQwdEsFoY72WO9prnqXk5z9XiuNJJfzbQm0_Gxn2Q0GCl0pBXAophE7b_pK2MdR3p/pub?output=csv';

    fetch(csvUrl).then(res => res.text()).then(data => {
        const row = data.split('\n').find(r => r.startsWith(id + ','));
        if (row) {
            const cols = row.split(',');
            const encodedName = encodeURIComponent(cols[1].trim());
            
            // إنشاء 10 شرائح صور برمجياً
            let slidesHtml = '';
            for(let i=1; i<=10; i++) {
                slidesHtml += `<div class="swiper-slide"><img src="images/${encodedName}%20${i}.jpg"></div>`;
            }

            document.getElementById('details').innerHTML = `
                <div class="swiper">
                    <div class="swiper-wrapper">${slidesHtml}</div>
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                </div>
                <div class="content" id="product-view">
                    <h1>${cols[1]}</h1>
                    <div class="price">${cols[2]} ج.م</div>
                    <p>${cols[7]}</p> 
                    <select id="size"><option selected disabled>Size</option>${cols[5].split('-').map(s => `<option>${s.trim()}</option>`).join('')}</select>
                    <select id="color"><option selected disabled>Colour</option>${cols[6].split('-').map(c => `<option>${c.trim()}</option>`).join('')}</select>
                    <div class="qty-container">
                        <div class="qty-wrapper"><button class="qty-btn" onclick="changeQty(-1)">-</button><span class="qty-value" id="qty">1</span><button class="qty-btn" onclick="changeQty(1)">+</button></div>
                        <small>عدد القطع</small>
                    </div>
                    <div class="note-box"><strong>ملاحظة:</strong> ${cols[3]}</div>
                    <button class="main-btn" onclick="showForm()">تأكيد الطلب</button>
                </div>
                <div id="order-form">
                    <div class="note-box" style="text-align: center;">🛍️✨ تأكيد الطلب يتم بتحويل 200 جنيه دفعة مقدمة لضمان حجز القطعة، والباقي عند الاستلام.</div>
                    <input type="text" id="name" placeholder="الاسم بالكامل">
                    <input type="tel" id="phone" placeholder="رقم الهاتف">
                    <input type="tel" id="altPhone" placeholder="رقم هاتف بديل">
                    <input type="text" id="city" placeholder="المدينة">
                    <input type="text" id="area" placeholder="المنطقة">
                    <input type="text" id="street" placeholder="الشارع الرئيسي">
                    <input type="text" id="building" placeholder="رقم العمارة">
                    <input type="text" id="floor" placeholder="الدور">
                    <input type="text" id="flat" placeholder="رقم الشقة">
                    <button class="main-btn" onclick="sendWhatsApp('${cols[1]}', '${cols[2]}')">شراء الآن</button>
                </div>
            `;
            document.getElementById('details').style.opacity = 1;
            new Swiper('.swiper', { 
                loop: true,
                navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' } 
            });
        }
    });

    function changeQty(val) {
        let q = document.getElementById('qty');
        let n = parseInt(q.innerText) + val;
        if (n > 0) q.innerText = n;
    }

    function showForm() {
        document.getElementById('product-view').style.display = 'none';
        document.getElementById('order-form').style.display = 'block';
    }

    function sendWhatsApp(name, price) {
        let msg = `طلب جديد:%0Aالمنتج: ${name}%0Aالسعر: ${price}%0Aالمقاس: ${document.getElementById('size').value}%0Aاللون: ${document.getElementById('color').value}%0Aالكمية: ${document.getElementById('qty').innerText}%0A%0Aبيانات العميل:%0Aالاسم: ${document.getElementById('name').value}%0Aالهاتف: ${document.getElementById('phone').value}%0Aالهاتف البديل: ${document.getElementById('altPhone').value}%0Aالعنوان: ${document.getElementById('city').value}، ${document.getElementById('area').value}، ${document.getElementById('street').value}، عمارة ${document.getElementById('building').value}، دور ${document.getElementById('floor').value}، شقة ${document.getElementById('flat').value}`;
        window.open('https://wa.me/201208377222?text=' + msg);
    }
</script>
</body>
</html>
